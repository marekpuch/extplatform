---
- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Ensure fail2ban jail.d directory exists
  ansible.builtin.file:
    path: "{{ fail2ban_jail_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure basic SSH protection jail
  ansible.builtin.template:
    src: sshd.local.j2
    dest: "{{ fail2ban_jail_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and started
  ansible.builtin.service:
    name: "{{ fail2ban_service_name }}"
    state: started
    enabled: true
