---
ssh_hardening_authorized_user: ubuntu
ssh_hardening_authorized_keys: "{{ ubuntu_authorized_keys | default([], true) }}"
ssh_hardening_config_path: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
ssh_hardening_service_name: ssh
ssh_hardening_password_authentication: "no"
ssh_hardening_kbd_interactive_authentication: "no"
ssh_hardening_challenge_response_authentication: "no"
ssh_hardening_pubkey_authentication: "yes"
ssh_hardening_permit_root_login: "no"
ssh_hardening_permit_empty_passwords: "no"
