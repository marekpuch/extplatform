---
- name: Ensure Observability compose project directory exists
  ansible.builtin.file:
    path: "{{ observability_compose_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy Observability docker compose stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ observability_compose_project_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ observability_compose_project_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ observability_compose_project_dir }}/promtail-config.yml"
    owner: root
    group: root
    mode: "0644"

- name: Deploy Grafana datasources
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ observability_compose_project_dir }}/grafana-datasources.yml"
    owner: root
    group: root
    mode: "0644"

- name: Start Observability stack with docker compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ observability_compose_project_dir }}"
  register: observability_compose_up
  changed_when: >-
    'Creating' in observability_compose_up.stdout or
    'Recreating' in observability_compose_up.stdout or
    'Starting' in observability_compose_up.stdout or
    'Pulling' in observability_compose_up.stdout
