---
- name: Configure external OVH VPS
  hosts: ovh_vps
  become: true
  gather_facts: true

  vars_files:
    - "../inventory/group_vars/secrets.yml"

  roles:
    - role: ssh_hardening
    - role: fail2ban
    - role: docker
    - role: wireguard_server
    - role: postgresql_compose
    - role: cloudflared_tunnel
    - role: openresty_compose
    - role: observability_compose
    - role: github_runner_docker
